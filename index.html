<html>

<head>
  <title>
    Simple translator/encoder
  </title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="https://j33569.github.io/1/main/favicon.svg">
</head>

<body>
  <script src="script.js"></script>
  <h1>A simple encoder</h1>
  <p class="key">Key</p>
  <div class="buttons">
    <button>Encode</button>
    <select name="key" id="key">
      <option value="000">000</option>
      <option value="001">001</option>
      <option value="002">002</option>
      <option value="003">003</option>
    </select>
    <button>Decode</button>
  </div>
  <div>
    <textarea type="text" placeholder="Put text to encode here" id="encoder"></textarea>
    <textarea type="text" placeholder="Put text to decode here" id="decoder"></textarea>
  </div>
</body>

</html>
